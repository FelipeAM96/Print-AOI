<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador AOI</title>
    
    <!-- Tailwind CSS para estilização da interface -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- JSZip para extrair arquivos .kmz -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- Leaflet CSS e JS para o fundo do OpenStreetMap -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- html2canvas para exportar o mapa HTML para PNG -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <link rel="icon" type="image/png" href="img/Treco_Engesat.png" onerror="this.remove()" />
    
    <style>
        /* Estilos adicionais para esconder scrollbar no canvas se necessário */
        .canvas-container {
            max-height: 70vh;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex flex-col items-center py-10 px-4">

    <div class="max-w-5xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        
        <!-- Cabeçalho -->
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-3xl font-bold">Processador de KML/KMZ</h1>
            <p class="text-blue-100 mt-2">Gere imagens de seus polígonos projetados em SIRGAS 2000 UTM automaticamente.</p>
        </div>

        <!-- Área Principal -->
        <div class="p-8">
            
            <!-- Mensagem de Erro (Oculta por padrão) -->
            <div id="errorBox" class="hidden mb-6 p-4 bg-red-100 text-red-700 border border-red-300 rounded-lg flex items-center">
                <svg class="w-6 h-6 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="errorMessage">Ocorreu um erro.</span>
            </div>

            <!-- Upload de Arquivo -->
            <div class="mb-8 flex flex-col items-center">
                <label for="fileInput" class="cursor-pointer border-2 border-dashed border-blue-400 bg-blue-50 hover:bg-blue-100 transition-colors w-full max-w-lg p-10 rounded-xl text-center">
                    <svg class="w-12 h-12 text-blue-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <span class="text-lg font-semibold text-blue-700 block" id="fileLabel">Clique para escolher o arquivo (.kml ou .kmz)</span>
                    <span class="text-sm text-blue-500 mt-1 block">Ou arraste e solte aqui</span>
                </label>
                <input type="file" id="fileInput" accept=".kml,.kmz" class="hidden" />
            </div>

            <!-- Botões de Ação -->
            <div id="actionsContainer" class="hidden flex justify-center mb-6">
                <button id="downloadBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transform transition hover:-translate-y-1 flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Baixar Imagem PNG
                </button>
            </div>

            <!-- Mapa de Pré-visualização com Leaflet -->
            <div id="canvasContainer" class="hidden w-full border border-slate-300 rounded-lg shadow-inner bg-slate-200 flex justify-center items-center relative" style="height: 600px;">
                
                <!-- Container do Leaflet (Os elementos agora vivem nativamente dentro dele) -->
                <div id="map" class="w-full h-full z-0 rounded-lg"></div>

            </div>

        </div>
    </div>

    <script>
        // Elementos do DOM
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const canvasContainer = document.getElementById('canvasContainer');
        const actionsContainer = document.getElementById('actionsContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const errorBox = document.getElementById('errorBox');
        const errorMessage = document.getElementById('errorMessage');

        let map = null;
        let polygonLayer = null;
        let currentFileName = '';

        // Constantes da Projeção e Elipsoide (GRS80 usado pelo SIRGAS 2000)
        const a = 6378137.0; // Semieixo maior
        const f = 1 / 298.257222101; // Achatamento
        const e2 = 2 * f - f * f; // Excentricidade ao quadrado

        // Lida com o upload do arquivo
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            hideError();
            currentFileName = file.name.split('.').slice(0, -1).join('.'); // Remove extensão
            fileLabel.textContent = `Arquivo selecionado: ${file.name}`;

            try {
                const arrayBuffer = await file.arrayBuffer();
                let kmlText = '';

                if (file.name.toLowerCase().endsWith('.kmz')) {
                    const zip = await JSZip.loadAsync(arrayBuffer);
                    const kmlFile = Object.values(zip.files).find(f => f.name.toLowerCase().endsWith('.kml'));
                    if (!kmlFile) throw new Error("Nenhum arquivo KML encontrado dentro do KMZ.");
                    kmlText = await kmlFile.async('string');
                } else if (file.name.toLowerCase().endsWith('.kml')) {
                    kmlText = new TextDecoder('utf-8').decode(arrayBuffer);
                } else {
                    throw new Error("Formato não suportado. Envie um arquivo .kml ou .kmz");
                }

                processKML(kmlText);

            } catch (err) {
                showError("Erro ao processar o arquivo: " + err.message);
                console.error(err);
            }
        });

        // Mostra mensagens de erro
        function showError(msg) {
            errorMessage.textContent = msg;
            errorBox.classList.remove('hidden');
            canvasContainer.classList.add('hidden');
            actionsContainer.classList.add('hidden');
        }

        function hideError() {
            errorBox.classList.add('hidden');
        }

        // Função principal de processamento
        function processKML(xmlText) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            
            const polygons = xmlDoc.getElementsByTagName("Polygon");
            if (polygons.length === 0) {
                throw new Error("Nenhum polígono encontrado no arquivo.");
            }

            let allRings = [];
            let totalLon = 0, totalLat = 0, pointsCount = 0;

            // Extrair coordenadas
            for (let i = 0; i < polygons.length; i++) {
                const outers = polygons[i].getElementsByTagName("outerBoundaryIs");
                if (outers.length > 0) {
                    const coordsNodes = outers[0].getElementsByTagName("coordinates");
                    if (coordsNodes.length > 0) {
                        const coordsStr = coordsNodes[0].textContent.trim();
                        // Separa por espaços ou quebras de linha
                        const pointsStr = coordsStr.split(/\s+/);
                        const ring = [];
                        
                        pointsStr.forEach(p => {
                            const parts = p.split(',');
                            if (parts.length >= 2) {
                                const lon = parseFloat(parts[0]);
                                const lat = parseFloat(parts[1]);
                                if (!isNaN(lon) && !isNaN(lat)) {
                                    ring.push({ lon, lat });
                                    totalLon += lon;
                                    totalLat += lat;
                                    pointsCount++;
                                }
                            }
                        });
                        
                        if (ring.length > 0) allRings.push(ring);
                    }
                }
            }

            if (allRings.length === 0) throw new Error("Não foi possível extrair as coordenadas do polígono.");

            // Identificar Fuso e Hemisfério com base no centroide aproximado
            const avgLon = totalLon / pointsCount;
            const avgLat = totalLat / pointsCount;
            
            const zoneNumber = Math.floor((avgLon + 180) / 6) + 1;
            const hemisphere = avgLat >= 0 ? 'N' : 'S';
            const projectionName = `UTM ${zoneNumber}${hemisphere} SIRGAS 2000`;

            // Projetar para UTM e calcular área
            let totalAreaSqMeters = 0;
            const ringsUTM = [];

            let minEasting = Infinity, maxEasting = -Infinity;
            let minNorthing = Infinity, maxNorthing = -Infinity;

            allRings.forEach(ring => {
                const ringUTM = ring.map(pt => {
                    const utm = latLonToUTM(pt.lat, pt.lon, zoneNumber);
                    
                    if (utm.easting < minEasting) minEasting = utm.easting;
                    if (utm.easting > maxEasting) maxEasting = utm.easting;
                    if (utm.northing < minNorthing) minNorthing = utm.northing;
                    if (utm.northing > maxNorthing) maxNorthing = utm.northing;

                    return utm;
                });
                totalAreaSqMeters += calculateShoelaceArea(ringUTM);
            });

            const areaKm2 = totalAreaSqMeters / 1000000;

            // Renderizar no Mapa Leaflet passando as coordenadas Geográficas
            renderMap(allRings, areaKm2, projectionName);
        }

        // Conversão WGS84 Geográfico para UTM
        function latLonToUTM(lat, lon, zone) {
            const k0 = 0.9996;
            const lonOrigin = (zone - 1) * 6 - 180 + 3; // Meridiano Central
            
            const latRad = lat * Math.PI / 180;
            const lonRad = lon * Math.PI / 180;
            const lonOriginRad = lonOrigin * Math.PI / 180;

            const N = a / Math.sqrt(1 - e2 * Math.sin(latRad) * Math.sin(latRad));
            const T = Math.tan(latRad) * Math.tan(latRad);
            const C = (e2 / (1 - e2)) * Math.cos(latRad) * Math.cos(latRad);
            const A = Math.cos(latRad) * (lonRad - lonOriginRad);

            const M = a * ((1 - e2/4 - 3*e2*e2/64 - 5*e2*e2*e2/256) * latRad 
                - (3*e2/8 + 3*e2*e2/32 + 45*e2*e2*e2/1024) * Math.sin(2*latRad) 
                + (15*e2*e2/256 + 45*e2*e2*e2/1024) * Math.sin(4*latRad) 
                - (35*e2*e2*e2/3072) * Math.sin(6*latRad));

            let easting = k0 * N * (A + (1-T+C)*A*A*A/6 + (5-18*T+T*T+72*C-58*(e2/(1-e2)))*A*A*A*A*A/120) + 500000.0;
            let northing = k0 * (M + N * Math.tan(latRad) * (A*A/2 + (5-T+9*C+4*C*C)*A*A*A*A/24 + (61-58*T+T*T+600*C-330*(e2/(1-e2)))*A*A*A*A*A*A/720));

            if (lat < 0) {
                northing += 10000000.0; // Falso norte para o hemisfério sul
            }

            return { easting, northing };
        }

        // Calcula a área plana (polígonos simples)
        function calculateShoelaceArea(points) {
            let area = 0;
            for (let i = 0; i < points.length; i++) {
                let j = (i + 1) % points.length;
                area += points[i].easting * points[j].northing;
                area -= points[j].easting * points[i].northing;
            }
            return Math.abs(area) / 2.0;
        }

        // Função para Renderizar no Leaflet
        function renderMap(ringsWGS84, areaKm2, projectionName) {
            // 1. Exibe o container e botões PRIMEIRO para o Leaflet saber as dimensões da tela
            canvasContainer.classList.remove('hidden');
            actionsContainer.classList.remove('hidden');

            // 2. Inicializa o mapa se não existir
            if (!map) {
                map = L.map('map', {
                    zoomControl: true,
                    attributionControl: false, // Ocultar para não poluir a imagem exportada
                    preferCanvas: true // CRUCIAL: Força renderização em Canvas para que o html2canvas consiga exportar o polígono!
                });
                
                // Camada base do OpenStreetMap
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    crossOrigin: true // Crucial para permitir a captura da imagem depois
                }).addTo(map);

                // Barra de Escala Nativa do Leaflet
                L.control.scale({ position: 'bottomleft', metric: true, imperial: false }).addTo(map);

                // --- NOVO: Norte Nativo do Leaflet ---
                const NorthControl = L.Control.extend({
                    options: { position: 'topright' },
                    onAdd: function () {
                        const div = L.DomUtil.create('div', 'leaflet-bar leaflet-control flex flex-col items-center');
                        // Força estilos inline robustos para garantir captura correta do html2canvas
                        div.style.backgroundColor = '#ffffff'; 
                        div.style.border = '2px solid #cbd5e1';
                        div.style.borderRadius = '6px';
                        div.style.padding = '10px';
                        div.style.boxShadow = '0 4px 6px -1px rgba(0, 0, 0, 0.1)';
                        div.innerHTML = `
                            <span style="font-weight: bold; font-size: 20px; color: #0f172a; line-height: 1; margin-bottom: 4px;">N</span>
                            <svg style="width: 24px; height: 40px;" viewBox="0 0 24 36" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 0 L24 36 L12 28 L0 36 Z" fill="#94a3b8"/>
                                <path d="M12 0 L12 28 L0 36 Z" fill="#334155"/>
                            </svg>
                        `;
                        return div;
                    }
                });
                map.addControl(new NorthControl());

                // --- NOVO: Legenda Nativa do Leaflet ---
                const LegendControl = L.Control.extend({
                    options: { position: 'bottomright' },
                    onAdd: function () {
                        const div = L.DomUtil.create('div', 'leaflet-bar leaflet-control text-left');
                        // Força estilos inline robustos
                        div.style.backgroundColor = '#ffffff';
                        div.style.border = '2px solid #cbd5e1';
                        div.style.borderRadius = '8px';
                        div.style.padding = '16px';
                        div.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.1)';
                        div.style.color = '#0f172a';
                        div.innerHTML = `
                            <p id="legendTitle" style="font-weight: bold; font-size: 16px; margin-bottom: 6px; margin-top: 0;">Local: -</p>
                            <p id="legendArea" style="font-size: 14px; margin: 2px 0;">Área: -</p>
                            <p id="legendProj" style="font-size: 14px; margin: 2px 0;">Sistema: -</p>
                        `;
                        return div;
                    }
                });
                map.addControl(new LegendControl());
            }

            // 3. Força o Leaflet a atualizar seu tamanho interno baseado na div que acabou de ficar visível
            map.invalidateSize();

            // 4. Limpa polígonos anteriores, se existirem
            if (polygonLayer) {
                map.removeLayer(polygonLayer);
            }

            // 5. Converte rings (objetos) para o formato do Leaflet (array de arrays de [lat, lon])
            const latLngs = ringsWGS84.map(ring => ring.map(pt => [pt.lat, pt.lon]));

            // 6. Adiciona o novo polígono (Grosso, Vermelho, Transparente)
            polygonLayer = L.polygon(latLngs, {
                color: '#ff0000', 
                weight: 6,        
                fillOpacity: 0    
            }).addTo(map);

            // 7. Atualiza a Legenda sobreposta que agora é parte do mapa
            document.getElementById('legendTitle').textContent = `Local: ${currentFileName}`;
            document.getElementById('legendArea').textContent = `Área: ${areaKm2.toLocaleString('pt-BR', { minimumFractionDigits: 4, maximumFractionDigits: 4 })} km²`;
            document.getElementById('legendProj').textContent = `Sistema: ${projectionName}`;

            // 8. Usa um pequeno timeout para garantir que o DOM processou a div visível antes de aplicar o Zoom
            setTimeout(() => { 
                map.invalidateSize(); // Atualiza dimensões mais uma vez por precaução
                map.fitBounds(polygonLayer.getBounds(), { padding: [50, 50] }); 
            }, 100);
        }

        // Função de Download com html2canvas
        downloadBtn.addEventListener('click', () => {
            const mapNode = document.getElementById('map'); // Alvo agora é APENAS o mapa
            
            // Estado visual de carregamento no botão
            const originalText = downloadBtn.innerHTML;
            downloadBtn.innerHTML = 'Processando Imagem...';
            downloadBtn.disabled = true;

            // Esconde temporariamente os botões nativos de zoom do mapa na captura
            const zoomControl = document.querySelector('.leaflet-control-zoom');
            if (zoomControl) zoomControl.style.display = 'none';

            // Zera o scroll da tela para evitar totalmente o deslocamento diagonal no export
            const originalScrollX = window.scrollX;
            const originalScrollY = window.scrollY;
            window.scrollTo(0, 0);

            // Aguarda um instante para garantir renderização do mapa
            setTimeout(() => {
                html2canvas(mapNode, {
                    useCORS: true,
                    allowTaint: false,
                    backgroundColor: '#ffffff', // Força fundo sólido para prevenir cinza
                    scale: 2 // Alta resolução
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `${currentFileName}_Mapa.png`;
                    link.href = canvas.toDataURL('image/png', 1.0);
                    link.click();
                    
                    // Restaura estado original
                    downloadBtn.innerHTML = originalText;
                    downloadBtn.disabled = false;
                    if (zoomControl) zoomControl.style.display = '';
                    window.scrollTo(originalScrollX, originalScrollY);
                }).catch(err => {
                    console.error("Erro ao gerar imagem:", err);
                    alert("Erro ao gerar imagem. Verifique sua conexão e tente novamente.");
                    
                    downloadBtn.innerHTML = originalText;
                    downloadBtn.disabled = false;
                    if (zoomControl) zoomControl.style.display = '';
                    window.scrollTo(originalScrollX, originalScrollY);
                });
            }, 500);
        });

        // Permitir drag & drop nativo
        const dropZone = document.querySelector('label[for="fileInput"]');
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('bg-blue-200'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('bg-blue-200'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            let dt = e.dataTransfer;
            let files = dt.files;
            fileInput.files = files;
            // Disparar evento de mudança manualmente
            fileInput.dispatchEvent(new Event('change'));
        }, false);

    </script>
</body>
</html>
